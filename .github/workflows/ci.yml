name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on C sources
        run: |
          cppcheck --enable=warning \
            --suppress=missingIncludeSystem \
            --suppress=constVariablePointer \
            --suppress=constVariable \
            --suppress=constParameterPointer \
            --suppress=knownConditionTrueFalse \
            --suppress=nullPointerRedundantCheck \
            --suppress=AssignmentAddressToInteger \
            --suppress=constStatement \
            --suppress=identicalInnerCondition \
            --suppress=variableScope \
            --suppress=unreadVariable \
            --error-exitcode=1 \
            --inline-suppr \
            -I . \
            main.c morans_i_utils.c morans_i_io.c morans_i_core.c \
            morans_i_spatial.c morans_i_residual.c morans_i_perm.c \
            morans_i_memory.c

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install flake8

      - name: Lint Python files
        run: |
          flake8 make_custom_w.py \
            --max-line-length=160 \
            --extend-ignore=W291,W292,W293,E302,E305,E231,F541 \
            --count --show-source --statistics

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS and LAPACK development headers
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev liblapacke-dev

      - name: Build with GCC and OpenBLAS
        run: make CC=gcc USE_OPENBLAS=1

      - name: Smoke test
        run: ./morans_i_mkl --run-toy-example -o /tmp/ci_toy -t 1
